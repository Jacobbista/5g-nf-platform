name: Build and push NF images

on:
  push:
    branches: [main]
    paths:
      - 'nfs/smf/**'
      - 'upstream-versions.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Override upstream Open5GS tag (e.g. v2.7.5)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build-smf:
    name: Build SMF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Read pinned upstream tag
        id: upstream
        run: |
          TAG=$(jq -r '.open5gs' upstream-versions.json)
          if [ -n "${{ github.event.inputs.upstream_tag }}" ]; then
            TAG="${{ github.event.inputs.upstream_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push SMF
        uses: docker/build-push-action@v5
        with:
          context: nfs/smf
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/5g-nf-platform/smf:${{ steps.upstream.outputs.semver }}-p0
            ghcr.io/${{ steps.owner.outputs.name }}/5g-nf-platform/smf:latest
          build-args: |
            UPSTREAM_TAG=${{ steps.upstream.outputs.tag }}
            NF_NAME=smf
          cache-from: type=gha
          cache-to: type=gha,mode=max
