name: Build and push NF images

on:
  push:
    branches: [main]
    paths:
      - 'nfs/**'
      - 'upstream-versions.json'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Override upstream Open5GS tag (e.g. v2.7.5)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.nf }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        nf: [smf, amf, upf, udm, ausf, udr, nrf, pcf, bsf, nssf]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Read pinned upstream tag
        id: upstream
        run: |
          TAG=$(jq -r '.open5gs' upstream-versions.json)
          if [ -n "${{ github.event.inputs.upstream_tag }}" ]; then
            TAG="${{ github.event.inputs.upstream_tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute patch revision
        id: patchrev
        run: |
          COUNT=$(ls nfs/${{ matrix.nf }}/patches/*.patch 2>/dev/null | wc -l)
          echo "rev=p${COUNT}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push ${{ matrix.nf }}
        uses: docker/build-push-action@v6
        with:
          context: nfs/${{ matrix.nf }}
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/5g-nf-platform/${{ matrix.nf }}:${{ steps.upstream.outputs.semver }}-${{ steps.patchrev.outputs.rev }}
            ghcr.io/${{ steps.owner.outputs.name }}/5g-nf-platform/${{ matrix.nf }}:latest
          build-args: |
            UPSTREAM_TAG=${{ steps.upstream.outputs.tag }}
            NF_NAME=${{ matrix.nf }}
          cache-from: type=gha,scope=${{ matrix.nf }}
          cache-to: type=gha,mode=max,scope=${{ matrix.nf }}

      - name: Output image tag
        id: imagetag
        run: echo "value=${{ steps.upstream.outputs.semver }}-${{ steps.patchrev.outputs.rev }}" >> "$GITHUB_OUTPUT"

  update-versions:
    name: Update versions.json
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Rebuild versions.json from patch counts
        run: |
          TAG=$(jq -r '.open5gs' upstream-versions.json)
          SEMVER="${TAG#v}"
          OWNER="${{ steps.owner.outputs.name }}"

          for NF in smf amf upf udm ausf udr nrf pcf bsf nssf; do
            COUNT=$(ls nfs/${NF}/patches/*.patch 2>/dev/null | wc -l)
            IMAGE="ghcr.io/${OWNER}/5g-nf-platform/${NF}:${SEMVER}-p${COUNT}"
            jq --arg nf "$NF" --arg img "$IMAGE" '.[$nf] = $img' versions.json \
              > versions.json.tmp && mv versions.json.tmp versions.json
          done

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "ci: update versions.json"
          git push
